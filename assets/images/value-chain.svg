<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360" role="img" aria-label="The AI value-capture spine: Scarcity, Control, Ownership">
  <rect width="640" height="360" fill="#fafafa"/>
  <text x="40" y="50" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="600" letter-spacing="2" fill="#52525b">THE AI VALUE-CAPTURE SPINE</text>
  <line x1="40" y1="64" x2="600" y2="64" stroke="#e4e4e7" stroke-width="1"/>

  <!-- Scarcity -->
  <rect x="40" y="86" width="560" height="70" rx="10" fill="#fffbeb" stroke="#fde68a" stroke-width="1"/>
  <circle cx="66" cy="121" r="6" fill="#b45309"/>
  <text x="84" y="120" font-family="Georgia, 'Times New Roman', serif" font-size="26" font-weight="700" fill="#b45309">Scarcity</text>
  <text x="84" y="142" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#52525b">Semiconductors &#183; Compute</text>
  <text x="584" y="127" text-anchor="end" font-family="Georgia, serif" font-size="15" font-style="italic" fill="#a1a1aa">captures value first</text>

  <!-- Control -->
  <rect x="40" y="168" width="560" height="70" rx="10" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1"/>
  <circle cx="66" cy="203" r="6" fill="#047857"/>
  <text x="84" y="202" font-family="Georgia, 'Times New Roman', serif" font-size="26" font-weight="700" fill="#047857">Control</text>
  <text x="84" y="224" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#52525b">Cloud &#183; Distribution</text>
  <text x="584" y="209" text-anchor="end" font-family="Georgia, serif" font-size="15" font-style="italic" fill="#a1a1aa">captures it most durably</text>

  <!-- Ownership -->
  <rect x="40" y="250" width="560" height="70" rx="10" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1"/>
  <circle cx="66" cy="285" r="6" fill="#4338ca"/>
  <text x="84" y="284" font-family="Georgia, 'Times New Roman', serif" font-size="26" font-weight="700" fill="#4338ca">Ownership</text>
  <text x="84" y="306" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#52525b">Agents &#183; Workflow &#183; Data</text>
  <text x="584" y="291" text-anchor="end" font-family="Georgia, serif" font-size="15" font-style="italic" fill="#a1a1aa">captures it last &#8212; but longest</text>

  <text x="40" y="346" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#a1a1aa">Semiconductors &#8594; Cloud &#8594; Foundation models &#8594; Agents &#8594; Applications</text>
</svg>
